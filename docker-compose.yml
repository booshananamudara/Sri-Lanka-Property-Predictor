version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: python:3.11-slim
    ports:
      - "5500:5500"
    volumes:
      - ./frontend:/app/frontend
    working_dir: /app/frontend
    command: python -m http.server 5500
    depends_on:
      - backend
